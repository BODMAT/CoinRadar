name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate (backend)
        run: npx prisma generate
        working-directory: ./apps/backend

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Backend integration tests
        run: npm run test:backend:int
